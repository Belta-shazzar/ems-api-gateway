spring:
  application:
    name: api-gateway

# ── Dev: Spring Cloud Config Server + Eureka ──────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: "dev"
    import: "optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888"
  cloud:
    config:
      retry:
        max-attempts: 5
        initial-interval: 2000
        max-interval: 10000
        multiplier: 1.5

# ── Prod: AWS Parameter Store (Eureka disabled) ───────────────────────────────
---
spring:
  config:
    activate:
      on-profile: "prod"
    import:
      - "aws-parameterstore:/config/application/"
      - "aws-parameterstore:/config/api-gateway/"
      - "aws-secretsmanager:/ems/jwt-secrets"
  cloud:
    config:
      enabled: false
    aws:
      region:
        static: ${AWS_DEFAULT_REGION:eu-west-1}
eureka:
  client:
    enabled: false
